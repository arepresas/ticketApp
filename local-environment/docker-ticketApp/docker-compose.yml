services:
  postgres:
    image: postgres:18.4-alpine
    container_name: ticketapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketAppDb}
      POSTGRES_USER: ${POSTGRES_USER:-ticketAppUser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketAppPass}
      # Postgres 18 stores data under a major-version subdir (e.g. /var/lib/postgresql/18).
      # Mounting the parent dir lets `pg_upgrade --link` work without boundary issues.
      PGDATA: /var/lib/postgresql/18/pgdata
    ports:
      - "${POSTGRES_PORT:-6432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
    name: ticketapp-postgres-data

