name: SonarQube (manual)

# Manual SonarCloud scan against any branch. Useful when you want a
# quality snapshot of a feature branch WITHOUT waiting for CI / pushing
# to main / opening a PR. Runs static analysis + jacoco/lcov coverage
# if a previous CI run uploaded the artifacts.
#
# Usage:
#   1. Actions tab → "SonarQube (manual)" → Run workflow
#   2. Pick the branch (defaults to the default branch)
#   3. Optionally override project key
#   4. Results land on the same branch in SonarCloud.
#
# Reuses the same secrets as CI:
#   SONAR_TOKEN, SONAR_HOST_URL, SONAR_ORGANIZATION

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to scan (must exist on origin)'
        required: true
        default: 'main'
        type: string
      project_key:
        description: 'Sonar project key (leave blank for default)'
        required: false
        default: ''
        type: string

concurrency:
  # One scan per branch at a time — re-running replaces the in-flight run.
  group: sonar-manual-${{ inputs.branch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SCAN_BRANCH: ${{ inputs.branch }}
      SCAN_PROJECT_KEY: ${{ inputs.project_key }}
    steps:
      - name: Validate inputs
        run: |
          if [ -z "$SCAN_BRANCH" ]; then
            echo "::error::Branch input is required."
            exit 1
          fi

      - name: Validate SonarQube secrets
        run: |
          missing=0
          for v in SONAR_TOKEN SONAR_HOST_URL SONAR_ORGANIZATION; do
            if [ -z "${!v}" ]; then
              echo "::error::Required secret $v is not set. Add it under Settings -> Secrets and variables -> Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0  # Sonar needs blame / SCM history.

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # The CI workflow only uploads artifacts from pushes/PRs to main, so a
      # manual scan on a feature branch usually has none. `download-artifact`
      # errors out hard when the artifact is missing, so we probe the API
      # first and skip the download silently if no prior CI run uploaded it.

      - name: Check for prior backend coverage artifact
        id: check-backend
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          found=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name=="backend-coverage" and .expired==false and .workflow_run.head_branch=="'"$SCAN_BRANCH"'") | .id' \
            | head -n1)
          set -e
          if [ -n "$found" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Found backend-coverage artifact id=$found"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No backend-coverage artifact for branch '$SCAN_BRANCH' — scan will proceed without backend coverage."
          fi

      - name: Restore backend jacoco coverage
        if: steps.check-backend.outputs.exists == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: backend-coverage
          path: .

      - name: Check for prior frontend coverage artifact
        id: check-frontend
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          found=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name=="frontend-coverage" and .expired==false and .workflow_run.head_branch=="'"$SCAN_BRANCH"'") | .id' \
            | head -n1)
          set -e
          if [ -n "$found" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Found frontend-coverage artifact id=$found"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend-coverage artifact for branch '$SCAN_BRANCH' — scan will proceed without frontend coverage."
          fi

      - name: Restore frontend lcov coverage
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: frontend-coverage
          path: front/coverage

      - name: Compile back-end (no tests)
        # sonar.java.binaries points at target/classes; without compiling
        # the scanner rejects the property. Skip tests — coverage is
        # either supplied via the artifacts above or omitted.
        run: mvn -B -ntp -DskipTests test-compile

      - name: Single SonarQube scan
        # Reuses the same scanner invocation as CI (pnpm dlx sonar) so the
        # scan mode, exclusions and project shape stay identical. Only
        # difference: we pin sonar.branch.name to whatever the user picked,
        # so the analysis appears under that branch in SonarCloud.
        #
        # Args are assembled inside the script (not via env pre-expansion)
        # so $GITHUB_WORKSPACE / $SONAR_HOST_URL get expanded by bash at
        # invocation time — earlier versions baked them into SCANNER_ARGS
        # which only got a single pass of expansion and shipped the literal
        # `$GITHUB_WORKSPACE` to the scanner.
        run: |
          set -euo pipefail
          args=(
            "-Dsonar.token=${SONAR_TOKEN}"
            "-Dsonar.host.url=${SONAR_HOST_URL}"
            "-Dsonar.organization=${SONAR_ORGANIZATION}"
            "-Dsonar.projectBaseDir=${GITHUB_WORKSPACE}"
            "-Dsonar.branch.name=${SCAN_BRANCH}"
            "-Dsonar.branch.target=main"
          )
          if [ -n "$SCAN_PROJECT_KEY" ]; then
            args+=("-Dsonar.projectKey=${SCAN_PROJECT_KEY}")
          fi
          pnpm --package=@sonar/scan@4.3.8 dlx sonar "${args[@]}"

      - name: Summary
        if: always()
        run: |
          {
            echo "### SonarQube manual scan"
            echo ""
            echo "- Branch: \`$SCAN_BRANCH\`"
            echo "- Project key: \`${SCAN_PROJECT_KEY:-com.ticketapp:ticketapp}\`"
            echo "- Host: $SONAR_HOST_URL"
            echo "- Backend coverage: \`${{ steps.check-backend.outputs.exists == 'true' && 'yes' || 'no' }}\`"
            echo "- Frontend coverage: \`${{ steps.check-frontend.outputs.exists == 'true' && 'yes' || 'no' }}\`"
            if [ "${{ job.status }}" = "success" ]; then
              echo "- Status: :white_check_mark: scan complete"
            else
              echo "- Status: :x: scan failed (check logs)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"