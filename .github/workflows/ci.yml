name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build & Test
        # Postgres is provided by Testcontainers; same path as local `mvn verify`.
        run: mvn -B -ntp verify

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3.0.0
        with:
          name: Backend (Maven)
          path: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload jacoco coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: backend-coverage
          path: |
            **/target/site/jacoco/jacoco.xml
            **/target/jacoco.exec
          if-no-files-found: ignore

  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint & Test
        run: pnpm test:ci

      - name: Build
        run: pnpm build

      - name: Test coverage (lcov)
        run: pnpm test:coverage

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3.0.0
        with:
          name: Frontend (Vitest)
          path: front/reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload lcov coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: frontend-coverage
          path: front/coverage/lcov.info
          if-no-files-found: ignore

  sonar:
    name: SonarQube scan (back + front)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Validate SonarQube secrets
        run: |
          missing=0
          for v in SONAR_TOKEN SONAR_HOST_URL SONAR_ORGANIZATION; do
            if [ -z "${!v}" ]; then
              echo "::error::Required secret $v is not set. Add it under Settings -> Secrets and variables -> Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compile back-end (no tests)
        # Required because sonar.java.binaries points at target/classes; without
        # compiling the scanner rejects the property.
        run: mvn -B -ntp -DskipTests test-compile

      - name: Restore backend jacoco coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: backend-coverage
          path: .

      - name: Restore frontend lcov coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: frontend-coverage
          path: front/coverage

      - name: Single SonarQube scan (back + front)
        run: |
          pnpm --package=@sonar/scan@4.3.8 dlx sonar \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.projectBaseDir=$GITHUB_WORKSPACE
