# ticketApp SonarQube configuration.
# Single scanner invocation that uploads both back-end (Java) and front-end
# (Svelte/JS) in one go. Triggered by the `sonar` job in ci.yml once
# `backend` and `frontend` jobs have succeeded.

sonar.projectKey=com.ticketapp:ticketapp
sonar.projectName=ticketapp
sonar.projectVersion=0.0.1

sonar.organization=${env:SONAR_ORGANIZATION}
sonar.host.url=${env:SONAR_HOST_URL}

# Two source roots in one project. Java sources first so the Java analyzer
# takes ownership; the JS/TS analyzer handles the front sources separately.
sonar.sources=\
  domain/src/main/java,\
  persistence/src/main/java,\
  minimax-ai/src/main/java,\
  bff/src/main/java,\
  front/src

sonar.tests=\
  domain/src/test/java,\
  persistence/src/test/java,\
  minimax-ai/src/test/java,\
  bff/src/test/java,\
  front/src

sonar.test.inclusions=\
  **/src/test/java/**/*Test.java,\
  **/src/test/java/**/*IT.java,\
  **/*.test.ts

sonar.test.exclusions=\
  **/support/**

sonar.language=java

sonar.java.binaries=\
  domain/target/classes,\
  persistence/target/classes,\
  minimax-ai/target/classes,\
  bff/target/classes

sonar.java.libraries=\
  domain/target/classes,\
  persistence/target/classes,\
  minimax-ai/target/classes,\
  bff/target/classes

sonar.coverage.jacoco.xmlReportPaths=\
  domain/target/site/jacoco/jacoco.xml,\
  persistence/target/site/jacoco/jacoco.xml,\
  minimax-ai/target/site/jacoco/jacoco.xml,\
  bff/target/site/jacoco/jacoco.xml

sonar.javascript.lcov.reportPaths=\
  front/coverage/lcov.info

# Tell sonar which paths are which language. This makes the engine
# dispatch the correct analyzer per file extension.
sonar.java.sources=\
  domain/src/main/java,\
  persistence/src/main/java,\
  minimax-ai/src/main/java,\
  bff/src/main/java

sonar.javascript.sources=\
  front/src

sonar.exclusions=\
  **/target/**,\
  front/node_modules/**,\
  front/dist/**,\
  front/coverage/**,\
  **/coverage/**,\
  **/.scannerwork/**,\
  **/*.xml,\
  **/*.md

sonar.java.exclusions=\
  front/**

sonar.javascript.exclusions=\
  domain/**,\
  persistence/**,\
  minimax-ai/**,\
  bff/**
